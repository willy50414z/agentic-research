name: Publish to PyPI

on:
  push:
    tags:
      - "v*"   # 打 v0.3.0 這類 tag 就觸發

jobs:
  publish:
    runs-on: ubuntu-latest

    # Trusted Publisher — 不需要存 PyPI token 在 Secrets
    # 需要在 PyPI 後台設定 GitHub trusted publisher（見 README）
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
