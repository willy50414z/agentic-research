networks:
  agentic-research_default:
    name: agentic-research_default

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentic-research-postgres
    restart: always
    environment:
      POSTGRES_DB: agentic-research
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ${VOLUME_BASE_DIR:-./data}/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic-research"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentic-research_default

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.2
    container_name: agentic-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ${VOLUME_BASE_DIR:-./data}/mlflow:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlflow/db
      --default-artifact-root /mlflow/artifacts
    networks:
      - agentic-research_default

  planka:
    image: ghcr.io/plankanban/planka:latest
    container_name: agentic-planka
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agentic-research
      SECRET_KEY: ${SECRET_KEY:-changeme-in-production}
      BASE_URL: http://localhost:7002
    volumes:
      - ${VOLUME_BASE_DIR:-./data}/planka/user-avatars:/app/public/user-avatars
      - ${VOLUME_BASE_DIR:-./data}/planka/project-background-images:/app/public/project-background-images
      - ${VOLUME_BASE_DIR:-./data}/planka/attachments:/app/private/attachments
    ports:
      - "7002:1337"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentic-research_default

  framework-api:
    image: ${FRAMEWORK_IMAGE:-ghcr.io/your-username/agentic-research:latest}
    container_name: agentic-framework-api
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agentic-research
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PLANKA_API_URL: http://planka:1337
      PLANKA_TOKEN: ${PLANKA_TOKEN:-}
      PLANKA_BOARD_ID: ${PLANKA_BOARD_ID:-}
      LLM_CHAIN: ${LLM_CHAIN:-local}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOCAL_LLM_ENDPOINT: ${LOCAL_LLM_ENDPOINT:-http://host.docker.internal:11434}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3.2}
      ARTIFACTS_DIR: /artifacts
    volumes:
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/root/.claude:ro
      - ${VOLUME_BASE_DIR:-./data}/artifacts:/artifacts
    ports:
      - "7001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentic-research_default
